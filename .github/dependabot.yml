version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      npm-non-major:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:30'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      actions-non-major:
        update-types: [minor, patch]
