version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      npm-non-major:
        update-types: [minor, patch]
    ignore:
      # Node API types must move with the pinned LTS runtime, not ahead of it.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      # Forge 7's fuse plugin currently peers on @electron/fuses 1.x.
      - dependency-name: '@electron/fuses'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:30'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      actions-non-major:
        update-types: [minor, patch]
